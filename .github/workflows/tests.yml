name: Unit Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - name: x86_64 gcc
            runs-on: ubuntu-26.04
            cc: /usr/bin/gcc
            cxx: /usr/bin/g++
          - name: x86_64 clang
            runs-on: ubuntu-26.04
            cc: /usr/bin/clang
            cxx: /usr/bin/clang++
          - name: arm64 gcc
            runs-on: ubuntu-26.04-arm
            cc: /usr/bin/gcc
            cxx: /usr/bin/g++
          - name: arm64 clang
            runs-on: ubuntu-26.04-arm
            cc: /usr/bin/clang
            cxx: /usr/bin/clang++

    name: ${{ matrix.name }} tests
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake g++ gcc make \
            libboost-all-dev libdouble-conversion-dev libfast-float-dev libfmt-dev libgflags-dev \
            libgoogle-glog-dev libsodium-dev libssl-dev libstdc++-16-dev libunwind-dev

      - name: Configure (CMake)
        run: |
          git submodule update --init --recursive
          CC=${{ matrix.cc }} CXX=${{ matrix.cxx }} \
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Run GoogleTest binaries
        run: |
          ./build/tests/test_basics
          ./build/tests/test_memory
          ./build/tests/test_masks
          ./build/tests/test_kernels
          ./build/tests/test_maps
          ./build/tests/test_probe_seq